[package]
name = "robot-kanban-service"
version = "1.0.0"
edition = "2021"
description = "Generated TeaQL service crate for robot-kanban-service"
license = "MIT OR Apache-2.0"

[dependencies]
log = "0.4"
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
teaql-core = "0.9.9"
teaql-macros = "0.9.9"
teaql-runtime = "0.9.9"
teaql-sql = "0.9.9"
teaql-provider-rusqlite = "0.9.9"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }