[package]
name = "robot-kanban-service"
version = "1.0.0"
edition = "2021"
description = "Generated TeaQL service crate for robot-kanban-service"
license = "MIT OR Apache-2.0"

[dependencies]
log = "0.4"
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
teaql-core = { version = "1.0.3", registry = "teaql" }
teaql-macros = { version = "1.0.3", registry = "teaql" }
teaql-runtime = { version = "1.0.3", registry = "teaql" }
teaql-sql = { version = "1.0.3", registry = "teaql" }
teaql-provider-rusqlite = { version = "1.0.3", registry = "teaql" }
rusqlite = { version = "0.32", features = ["bundled", "chrono", "column_decltype"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }