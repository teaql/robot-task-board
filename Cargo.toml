[package]
name = "robot-task-board"
version = "0.1.0"
edition = "2021"
default-run = "robot-task-board"

[dependencies]
crossterm = { version = "0.27", features = ["event-stream"] }
ratatui = "0.30"
rusqlite = { version = "0.32", features = ["bundled", "column_decltype"] }
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# TeaQL runtime packages
teaql-core = "3.0.0"
teaql-runtime = "3.0.0"
teaql-macros = "3.0.0"
teaql-sql = "3.0.0"
teaql-provider-rusqlite = "3.0.0"
teaql-data-service = "3.0.0"

# Our generated TeaQL domain logic library
robot_kanban = { path = "./generate-lib/lib", package = "robot_kanban_service" }
whoami = "2.1.2"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true

[patch.crates-io]
teaql-core = { path = "../teaql-rs/teaql-core" }
teaql-macros = { path = "../teaql-rs/teaql-macros" }
teaql-runtime = { path = "../teaql-rs/teaql-runtime" }
teaql-sql = { path = "../teaql-rs/teaql-sql" }
teaql-data-service = { path = "../teaql-rs/teaql-data-service" }
teaql-provider-rusqlite = { path = "../teaql-rs/teaql-provider-rusqlite" }
