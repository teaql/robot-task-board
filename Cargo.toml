[package]
name = "robot-task-board"
version = "0.1.0"
edition = "2021"

[dependencies]
crossterm = { version = "0.27", features = ["event-stream"] }
ratatui = "0.26"
rusqlite = { version = "0.32", features = ["bundled", "column_decltype"] }
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Local teaql-rs workspace packages
teaql-core = { path = "/home/philip/teaql-home/teaql-rs/teaql-core" }
teaql-runtime = { path = "/home/philip/teaql-home/teaql-rs/teaql-runtime" }
teaql-macros = { path = "/home/philip/teaql-home/teaql-rs/teaql-macros" }
teaql-sql = { path = "/home/philip/teaql-home/teaql-rs/teaql-sql" }
teaql-provider-rusqlite = { path = "/home/philip/teaql-home/teaql-rs/teaql-provider-rusqlite" }

# Our generated TeaQL domain logic library
robot-kanban = { path = "./generate-lib/lib" }

[patch.teaql]
teaql-core = { path = "/home/philip/teaql-home/teaql-rs/teaql-core" }
teaql-runtime = { path = "/home/philip/teaql-home/teaql-rs/teaql-runtime" }
teaql-macros = { path = "/home/philip/teaql-home/teaql-rs/teaql-macros" }
teaql-sql = { path = "/home/philip/teaql-home/teaql-rs/teaql-sql" }
teaql-provider-rusqlite = { path = "/home/philip/teaql-home/teaql-rs/teaql-provider-rusqlite" }
