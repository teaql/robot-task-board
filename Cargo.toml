[package]
name = "robot-task-board"
version = "0.1.0"
edition = "2021"
default-run = "robot-task-board"

[dependencies]
crossterm = { version = "0.27", features = ["event-stream"] }
ratatui = "0.26"
rusqlite = { version = "0.32", features = ["bundled", "column_decltype"] }
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# TeaQL runtime packages
teaql-core = "1.1.0"
teaql-runtime = "1.1.0"
teaql-macros = "1.1.0"
teaql-sql = "1.1.0"
teaql-provider-rusqlite = "1.1.0"

# Our generated TeaQL domain logic library
robot-kanban = { package = "robot-kanban-service", path = "./generate-lib/lib" }
whoami = "2.1.2"

